# Define an ACL for your internal Docker network
acl localnet src 172.16.0.0/12  # Standard Docker default range
acl localnet src 192.168.0.0/16 # Alternative Docker range

# Allow the ports you need
acl SSL_ports port 443
acl Safe_ports port 80      # http
acl Safe_ports port 443     # https
acl CONNECT method CONNECT

# Recommended Minimum Access Permission
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ALWAYS allow localhost and your localnet (the workspace)
http_access allow localhost
http_access allow localnet

# Finally, deny everything else
http_access deny all

# Squid normally listens on 3128
http_port 3128